<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mutual Fund Explorer — India</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0f1117; --bg2:#181c27; --bg3:#1e2233;
    --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.14);
    --text:#e8eaf0; --text2:#9aa0b4; --text3:#636878;
    --blue:#378ADD; --blue-dark:#185FA5;
    --green:#639922; --green-bg:rgba(99,153,34,.12);
    --red:#E24B4A; --red-bg:rgba(226,75,74,.12);
    --radius-md:8px; --radius-lg:12px;
  }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; font-size:14px; line-height:1.6; min-height:100vh; }
  .container { max-width:1200px; margin:0 auto; padding:2rem 1.5rem; }

  /* header */
  .header { display:flex; align-items:center; gap:12px; margin-bottom:2rem; }
  .header-icon { width:42px; height:42px; background:var(--blue-dark); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; color:var(--blue); font-size:20px; flex-shrink:0; }
  .header-text h1 { font-size:20px; font-weight:600; }
  .header-text p { font-size:12px; color:var(--text2); }
  .live-dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:#8bc34a; margin-right:5px; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  .refresh-btn { font-size:12px; color:var(--text3); background:none; border:1px solid var(--border2); cursor:pointer; display:flex; align-items:center; gap:5px; padding:5px 10px; border-radius:var(--radius-md); margin-left:auto; transition:color .15s,border-color .15s; }
  .refresh-btn:hover { color:var(--text2); border-color:var(--blue); }
  .refresh-btn.spinning i { animation:spin .7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* tabs */
  .tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:1.5rem; }
  .tab { padding:9px 20px; font-size:13px; font-weight:500; cursor:pointer; border:none; background:none; color:var(--text2); border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .15s; display:flex; align-items:center; gap:6px; }
  .tab.active { color:var(--text); border-bottom-color:var(--blue); }
  .tab:hover:not(.active) { color:var(--text); }
  .panel { display:none; }
  .panel.active { display:block; }
  .pf-badge { background:var(--blue-dark); color:#fff; font-size:10px; padding:1px 6px; border-radius:10px; margin-left:2px; }

  /* metrics */
  .metric-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:1.5rem; }
  .metric { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-md); padding:1rem; }
  .metric-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
  .metric-value { font-size:22px; font-weight:600; }
  .metric-value.green { color:#8bc34a; }
  .metric-value.red   { color:var(--red); }

  /* filters */
  .filter-bar { display:flex; gap:8px; margin-bottom:1rem; flex-wrap:wrap; align-items:center; }
  .filter-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; white-space:nowrap; }
  .filter-btn { padding:4px 12px; border-radius:20px; border:1px solid var(--border2); background:none; color:var(--text2); font-size:12px; cursor:pointer; transition:all .1s; white-space:nowrap; }
  .filter-btn.active { background:var(--blue-dark); color:#fff; border-color:var(--blue-dark); }
  .filter-btn:hover:not(.active) { border-color:var(--blue); color:var(--text); }
  .search-box { padding:5px 10px; border-radius:var(--radius-md); border:1px solid var(--border2); background:var(--bg3); color:var(--text); font-size:13px; outline:none; width:220px; transition:border-color .15s; }
  .search-box:focus { border-color:var(--blue); }
  .search-box::placeholder { color:var(--text3); }

  /* table */
  .table-wrap { overflow-x:auto; border-radius:var(--radius-lg); border:1px solid var(--border); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { text-align:left; font-size:11px; font-weight:500; color:var(--text3); padding:10px 12px; border-bottom:1px solid var(--border); background:var(--bg2); text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; cursor:pointer; user-select:none; }
  thead th:hover { color:var(--text2); }
  tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--bg2); }
  td { padding:9px 12px; color:var(--text); vertical-align:middle; white-space:nowrap; }

  .badge { display:inline-block; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:500; }
  .badge-cat  { background:rgba(255,255,255,.06); color:var(--text2); }
  .badge-low  { background:rgba(99,153,34,.15); color:#8bc34a; }
  .badge-med  { background:rgba(186,117,23,.15); color:#ffb74d; }
  .badge-high { background:rgba(226,75,74,.15); color:#ef5350; }
  .badge-plan { background:rgba(55,138,221,.1); color:var(--blue); font-size:10px; }

  .ret-green { color:#8bc34a; font-weight:600; }
  .ret-amber { color:#ffb74d; font-weight:600; }
  .ret-red   { color:#ef5350; font-weight:600; }
  .ret-na    { color:var(--text3); }

  /* buttons */
  .btn { padding:6px 14px; border-radius:var(--radius-md); border:1px solid var(--border2); background:none; color:var(--text); font-size:12px; cursor:pointer; transition:all .1s; display:inline-flex; align-items:center; gap:4px; }
  .btn:hover { background:var(--bg3); border-color:var(--blue); }
  .btn-primary { background:var(--blue-dark); color:#fff; border-color:var(--blue-dark); }
  .btn-primary:hover { background:#0C447C; }
  .btn-danger { color:var(--red); border-color:var(--red); }
  .btn-danger:hover { background:var(--red-bg); }

  /* forms */
  .form-row { display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:10px; align-items:end; margin-bottom:1.5rem; background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1rem 1.25rem; }
  .form-group { display:flex; flex-direction:column; gap:5px; }
  .form-group label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.04em; }
  .form-group input, .form-group select { padding:8px 10px; border-radius:var(--radius-md); border:1px solid var(--border2); background:var(--bg3); color:var(--text); font-size:13px; outline:none; transition:border-color .15s; }
  .form-group input:focus, .form-group select:focus { border-color:var(--blue); }
  .form-group select option { background:var(--bg3); }

  /* states */
  .empty-state { text-align:center; padding:4rem 2rem; color:var(--text3); }
  .empty-state i { font-size:40px; margin-bottom:12px; display:block; }

  /* progress */
  .progress-wrap { padding:3rem 2rem; text-align:center; }
  .progress-title { font-size:14px; color:var(--text2); margin-bottom:1rem; }
  .progress-bar-bg { height:6px; background:var(--bg3); border-radius:3px; overflow:hidden; max-width:400px; margin:0 auto 10px; }
  .progress-bar-fill { height:100%; background:var(--blue-dark); border-radius:3px; transition:width .3s; }
  .progress-detail { font-size:12px; color:var(--text3); }

  /* error */
  .error-banner { background:var(--red-bg); border:1px solid rgba(226,75,74,.3); border-radius:var(--radius-md); padding:10px 14px; font-size:13px; color:#ef5350; margin-bottom:1rem; display:flex; align-items:center; gap:8px; }

  /* portfolio cards */
  .trend-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; margin-bottom:1rem; }
  .trend-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; gap:12px; }
  .trend-name { font-size:15px; font-weight:600; }
  .trend-meta { font-size:12px; color:var(--text2); margin-top:3px; }
  .return-pill { font-size:13px; font-weight:600; padding:3px 12px; border-radius:20px; white-space:nowrap; }
  .return-pos { background:var(--green-bg); color:#8bc34a; }
  .return-neg { background:var(--red-bg); color:#ef5350; }
  .holding-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
  .h-stat-label { font-size:11px; color:var(--text3); margin-bottom:2px; }
  .h-stat-val   { font-size:14px; font-weight:600; }
  .chart-wrap { position:relative; width:100%; height:150px; }

  .pagination { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-top:1px solid var(--border); font-size:12px; color:var(--text3); }
  .page-btns { display:flex; gap:4px; }
  .page-btn { padding:3px 10px; border-radius:var(--radius-md); border:1px solid var(--border2); background:none; color:var(--text2); font-size:12px; cursor:pointer; }
  .page-btn.active { background:var(--blue-dark); color:#fff; border-color:var(--blue-dark); }
  .page-btn:hover:not(.active):not(:disabled) { border-color:var(--blue); color:var(--text); }
  .page-btn:disabled { opacity:.35; cursor:default; }

  @media(max-width:700px) {
    .form-row { grid-template-columns:1fr 1fr; }
    .holding-stats { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon"><i class="ti ti-chart-candle"></i></div>
    <div class="header-text">
      <h1>Mutual Fund Explorer — India</h1>
      <p><span class="live-dot"></span>Live via FinAPI · <span id="last-updated">Loading…</span></p>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadAllFunds(true)">
      <i class="ti ti-refresh"></i> Refresh
    </button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('explore')"><i class="ti ti-list-search"></i> Explore funds</button>
    <button class="tab" onclick="switchTab('portfolio')">
      <i class="ti ti-briefcase"></i> My portfolio
      <span class="pf-badge" id="pf-count" style="display:none;"></span>
    </button>
  </div>

  <!-- Explore Panel -->
  <div id="panel-explore" class="panel active">

    <div class="metric-row">
      <div class="metric"><div class="metric-label">Total funds</div><div class="metric-value" id="m-total">—</div></div>
      <div class="metric"><div class="metric-label">Showing</div><div class="metric-value" id="m-count">—</div></div>
      <div class="metric"><div class="metric-label">Best 1Y return</div><div class="metric-value green" id="m-best1y">—</div></div>
      <div class="metric"><div class="metric-label">Avg expense ratio</div><div class="metric-value" id="m-avgexp">—</div></div>
      <div class="metric"><div class="metric-label">Low risk</div><div class="metric-value" id="m-lowrisk">—</div></div>
    </div>

    <div class="filter-bar">
      <input class="search-box" id="search-box" placeholder="Search fund name or house…" oninput="onFilter()" />
    </div>
    <div class="filter-bar">
      <span class="filter-label">Category:</span>
      <button class="filter-btn active" onclick="setFilter('cat','All',this)">All</button>
      <button class="filter-btn" onclick="setFilter('cat','Equity',this)">Equity</button>
      <button class="filter-btn" onclick="setFilter('cat','Debt',this)">Debt</button>
      <button class="filter-btn" onclick="setFilter('cat','Hybrid',this)">Hybrid</button>
      <button class="filter-btn" onclick="setFilter('cat','Index',this)">Index / ETF</button>
    </div>
    <div class="filter-bar">
      <span class="filter-label">Risk:</span>
      <button class="filter-btn active" onclick="setFilter('risk','All',this)">All</button>
      <button class="filter-btn" onclick="setFilter('risk','Low',this)">Low</button>
      <button class="filter-btn" onclick="setFilter('risk','Moderate',this)">Moderate</button>
      <button class="filter-btn" onclick="setFilter('risk','High',this)">High</button>
      <span class="filter-label" style="margin-left:8px;">Plan:</span>
      <button class="filter-btn active" onclick="setFilter('plan','All',this)">All</button>
      <button class="filter-btn" onclick="setFilter('plan','Direct',this)">Direct</button>
      <button class="filter-btn" onclick="setFilter('plan','Regular',this)">Regular</button>
      <span class="filter-label" style="margin-left:8px;">Option:</span>
      <button class="filter-btn active" onclick="setFilter('opt','All',this)">All</button>
      <button class="filter-btn" onclick="setFilter('opt','Growth',this)">Growth</button>
      <button class="filter-btn" onclick="setFilter('opt','IDCW',this)">IDCW</button>
    </div>

    <div id="explore-content">
      <div class="progress-wrap">
        <div class="progress-title">Fetching all funds from FinAPI…</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="progress-detail" id="prog-detail">Starting…</div>
      </div>
    </div>
  </div>

  <!-- Portfolio Panel -->
  <div id="panel-portfolio" class="panel">
    <div class="form-row">
      <div class="form-group">
        <label>Fund</label>
        <select id="pf-fund"><option value="">Select a fund…</option></select>
      </div>
      <div class="form-group">
        <label>Amount invested (₹)</label>
        <input type="number" id="pf-amount" placeholder="e.g. 10000" min="100" />
      </div>
      <div class="form-group">
        <label>Purchase NAV (₹)</label>
        <input type="number" id="pf-nav" placeholder="e.g. 45.20" step="0.01" />
      </div>
      <button class="btn btn-primary" onclick="addToPortfolio()"><i class="ti ti-plus"></i> Add</button>
    </div>
    <div id="pf-metrics" class="metric-row" style="display:none;"></div>
    <div id="pf-empty" class="empty-state"><i class="ti ti-briefcase"></i><p>No holdings yet. Add a fund above to track your portfolio.</p></div>
    <div id="pf-holdings"></div>
  </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const API      = 'https://finapi.upvaly.com/api/mf';
const CACHE_KEY = 'finapi_all_v1';
const CACHE_TTL = 2 * 60 * 60 * 1000; // 2 hours
const PAGE_SIZE = 50;
const TOTAL_PAGES = 289;
const BATCH = 1;            // sequential — avoids 429 rate-limits
const REQUEST_DELAY = 300;  // ms between requests
const RETRY_DELAY   = 3000; // ms to wait after a 429
const TABLE_PAGE_SIZE = 100;

let allFunds = [];
let filteredCache = [];
let tablePage = 1;
let filters = { cat:'All', risk:'All', plan:'All', opt:'All', q:'' };
let sortCol = 'ret1', sortDir = -1;
let portfolio = [];
let chartInstances = {};

/* ── Risk / Category mapping ── */
function mapRisk(r) {
  if (!r) return 'High';
  const l = r.toLowerCase();
  if (l === 'low risk') return 'Low';
  if (l.includes('moderately low') || l === 'moderate risk' || l.includes('moderately high')) return 'Moderate';
  return 'High';
}
function mapCat(c) {
  if (!c) return 'Equity';
  const l = c.toLowerCase();
  if (l.includes('debt') || l.includes('bond') || l.includes('gilt') || l.includes('liquid') || l.includes('money market') || l.includes('credit') || l.includes('banking and psu') || l.includes('corporate bond') || l.includes('duration') || l.includes('floater')) return 'Debt';
  if (l.includes('hybrid') || l.includes('balanced') || l.includes('allocation') || l.includes('multi asset') || l.includes('arbitrage') || l.includes('equity savings')) return 'Hybrid';
  if (l.includes('index') || l.includes('etf') || l.includes('exchange')) return 'Index';
  return 'Equity';
}
function mapPlan(p) {
  if (!p) return 'Direct';
  return p.toLowerCase().includes('regular') ? 'Regular' : 'Direct';
}
function mapOpt(o) {
  if (!o) return 'Growth';
  const l = o.toLowerCase();
  if (l.includes('idcw') || l.includes('dividend')) return 'IDCW';
  return 'Growth';
}

function norm(r) {
  const cagr = r.cagr || {};
  return {
    schemeCode: r.schemeCode,
    name:       r.schemeName || '',
    fundHouse:  r.fundHouse  || '',
    cat:        mapCat(r.schemeCategory),
    risk:       mapRisk(r.schemeRisk),
    plan:       mapPlan(r.planName),
    opt:        mapOpt(r.optionName),
    ret1:       cagr['1y']  != null ? parseFloat(cagr['1y'])  : null,
    ret3:       cagr['3y']  != null ? parseFloat(cagr['3y'])  : null,
    ret5:       cagr['5y']  != null ? parseFloat(cagr['5y'])  : null,
    exp:        r.expenseRatio != null ? parseFloat(r.expenseRatio) : null,
    nav:        r.latestNav != null ? parseFloat(r.latestNav) : null,
    navDate:    r.latestNavDate || null,
    prevNav:    r.previousNav  != null ? parseFloat(r.previousNav) : null,
    high52:     r['52WeekHighNav'] != null ? parseFloat(r['52WeekHighNav']) : null,
    low52:      r['52WeekLowNav']  != null ? parseFloat(r['52WeekLowNav'])  : null,
    aum:        r.aum != null ? parseFloat(r.aum) : null,
  };
}

/* ── Fetch all pages in parallel batches ── */
async function loadAllFunds(forceRefresh = false) {
  if (!forceRefresh) {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) {
        const cached = JSON.parse(raw);
        if (Date.now() - cached.ts < CACHE_TTL && cached.funds && cached.funds.length > 1000) {
          allFunds = cached.funds;
          onLoaded();
          return;
        }
      }
    } catch(e) {}
  }

  document.getElementById('refresh-btn').classList.add('spinning');
  showProgress(0, 0, TOTAL_PAGES);

  const collected = [];
  let done = 0;

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function fetchPage(p) {
    for (let attempt = 0; attempt < 5; attempt++) {
      try {
        const res = await fetch(`${API}/paginated?page=${p}&limit=${PAGE_SIZE}`);
        if (res.status === 429) {
          showProgress(done, collected.length, TOTAL_PAGES, `Rate limited — waiting ${RETRY_DELAY/1000}s…`);
          await sleep(RETRY_DELAY);
          continue;
        }
        if (!res.ok) return [];
        const j = await res.json();
        return j?.data?.content || [];
      } catch(e) { await sleep(1000); }
    }
    return [];
  }

  for (let p = 1; p <= TOTAL_PAGES; p++) {
    const content = await fetchPage(p);
    content.forEach(r => collected.push(norm(r)));
    done++;
    showProgress(done, collected.length, TOTAL_PAGES);
    if (content.length === 0 && p > 10) break; // hit real end of data
    if (p < TOTAL_PAGES) await sleep(REQUEST_DELAY);
  }

  if (!collected.length) {
    showError('Failed to load any fund data. Please check your connection and try again.');
    document.getElementById('refresh-btn').classList.remove('spinning');
    return;
  }

  allFunds = collected;
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), funds: allFunds })); } catch(e) {}

  document.getElementById('refresh-btn').classList.remove('spinning');
  onLoaded();
}

function showProgress(pagesLoaded, fundsLoaded, total, status) {
  const pct = Math.round(pagesLoaded / total * 100);
  const eta = pagesLoaded > 0
    ? Math.round((total - pagesLoaded) * REQUEST_DELAY / 1000) + 's remaining'
    : '';
  document.getElementById('explore-content').innerHTML = `
    <div class="progress-wrap">
      <div class="progress-title">${status || ('Fetching all funds from FinAPI… ' + pagesLoaded + '/' + total + ' pages')}</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-detail">${fundsLoaded.toLocaleString('en-IN')} funds loaded${eta ? ' · ~' + eta : ''}</div>
    </div>`;
}

function showError(msg) {
  document.getElementById('explore-content').innerHTML = `
    <div class="error-banner"><i class="ti ti-alert-circle"></i>${msg}</div>
    <div style="text-align:center;padding:1rem;">
      <button class="btn btn-primary" onclick="loadAllFunds(true)"><i class="ti ti-refresh"></i> Retry</button>
    </div>`;
}

function onLoaded() {
  document.getElementById('m-total').textContent = allFunds.length.toLocaleString('en-IN');
  document.getElementById('last-updated').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  applyFilters();
  populateFundSelect();
}

/* ── Filtering & sorting ── */
function setFilter(key, val, el) {
  filters[key] = val;
  const groups = {
    cat:  ['All','Equity','Debt','Hybrid','Index / ETF'],
    risk: ['All','Low','Moderate','High'],
    plan: ['All','Direct','Regular'],
    opt:  ['All','Growth','IDCW'],
  };
  document.querySelectorAll('.filter-btn').forEach(b => {
    if (groups[key].includes(b.textContent.trim())) b.classList.remove('active');
  });
  el.classList.add('active');
  tablePage = 1;
  applyFilters();
}

function onFilter() {
  filters.q = document.getElementById('search-box').value.trim().toLowerCase();
  tablePage = 1;
  applyFilters();
}

function applyFilters() {
  const q = filters.q;
  filteredCache = allFunds.filter(f =>
    (filters.cat  === 'All' || f.cat  === filters.cat) &&
    (filters.risk === 'All' || f.risk === filters.risk) &&
    (filters.plan === 'All' || f.plan === filters.plan) &&
    (filters.opt  === 'All' || f.opt  === filters.opt)  &&
    (!q || f.name.toLowerCase().includes(q) || f.fundHouse.toLowerCase().includes(q))
  ).sort((a, b) => {
    const av = a[sortCol] ?? -Infinity, bv = b[sortCol] ?? -Infinity;
    return sortDir * (bv - av);
  });

  updateMetrics();
  renderTable();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = -1; }
  tablePage = 1;
  applyFilters();
}

/* ── Metrics ── */
function updateMetrics() {
  const f = filteredCache;
  document.getElementById('m-count').textContent = f.length.toLocaleString('en-IN');
  const best = f.reduce((m, x) => x.ret1 != null && x.ret1 > m ? x.ret1 : m, -Infinity);
  document.getElementById('m-best1y').textContent = best > -Infinity ? best.toFixed(1) + '%' : '—';
  const exps = f.filter(x => x.exp != null).map(x => x.exp);
  document.getElementById('m-avgexp').textContent = exps.length ? (exps.reduce((s,v)=>s+v,0)/exps.length).toFixed(2)+'%' : '—';
  document.getElementById('m-lowrisk').textContent = f.filter(x => x.risk === 'Low').length.toLocaleString('en-IN');
}

/* ── Table rendering with client-side pagination ── */
function sa(col) {
  if (sortCol !== col) return '<i class="ti ti-arrows-sort" style="font-size:10px;opacity:.4;" aria-hidden="true"></i>';
  return sortDir < 0
    ? '<i class="ti ti-sort-descending" style="font-size:10px;color:var(--blue);" aria-hidden="true"></i>'
    : '<i class="ti ti-sort-ascending"  style="font-size:10px;color:var(--blue);" aria-hidden="true"></i>';
}
function rb(r) {
  if (r==='Low')      return '<span class="badge badge-low">Low</span>';
  if (r==='Moderate') return '<span class="badge badge-med">Moderate</span>';
  return '<span class="badge badge-high">High</span>';
}
function rc(v, t=10) {
  if (v == null) return '<span class="ret-na">—</span>';
  const c = v>=15?'ret-green':v>=t?'ret-amber':'ret-red';
  return `<span class="${c}">${v.toFixed(1)}%</span>`;
}

function renderTable() {
  if (!filteredCache.length) {
    document.getElementById('explore-content').innerHTML =
      '<div class="empty-state"><i class="ti ti-mood-empty"></i><p>No funds match the current filters.</p></div>';
    return;
  }

  const totalPages = Math.ceil(filteredCache.length / TABLE_PAGE_SIZE);
  if (tablePage > totalPages) tablePage = totalPages;
  const start = (tablePage - 1) * TABLE_PAGE_SIZE;
  const slice = filteredCache.slice(start, start + TABLE_PAGE_SIZE);

  // page number buttons: show up to 7 around current
  let pageButtons = '';
  const range = [];
  range.push(1);
  for (let i = Math.max(2, tablePage-2); i <= Math.min(totalPages-1, tablePage+2); i++) range.push(i);
  if (totalPages > 1) range.push(totalPages);
  let last = 0;
  range.forEach(p => {
    if (p - last > 1) pageButtons += `<span class="page-btn" style="border:none;cursor:default;color:var(--text3);">…</span>`;
    pageButtons += `<button class="page-btn${p===tablePage?' active':''}" onclick="goPage(${p})">${p}</button>`;
    last = p;
  });

  document.getElementById('explore-content').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:26%">Fund name</th>
          <th style="width:7%" onclick="sortBy('cat')">Category ${sa('cat')}</th>
          <th style="width:5%">Plan</th>
          <th style="width:6%">Risk</th>
          <th style="width:7%" onclick="sortBy('ret1')">1Y ret ${sa('ret1')}</th>
          <th style="width:7%" onclick="sortBy('ret3')">3Y ret ${sa('ret3')}</th>
          <th style="width:7%" onclick="sortBy('ret5')">5Y ret ${sa('ret5')}</th>
          <th style="width:8%" onclick="sortBy('exp')">Exp ratio ${sa('exp')}</th>
          <th style="width:9%" onclick="sortBy('nav')">Live NAV ${sa('nav')}</th>
          <th style="width:8%" onclick="sortBy('aum')">AUM (Cr) ${sa('aum')}</th>
          <th style="width:5%">Add</th>
        </tr></thead>
        <tbody>${slice.map(f => `
          <tr>
            <td style="font-weight:500;max-width:0;overflow:hidden;text-overflow:ellipsis;" title="${f.name}">${f.name}</td>
            <td><span class="badge badge-cat">${f.cat}</span></td>
            <td><span class="badge badge-plan">${f.plan}</span></td>
            <td>${rb(f.risk)}</td>
            <td>${rc(f.ret1)}</td>
            <td>${rc(f.ret3)}</td>
            <td>${rc(f.ret5)}</td>
            <td style="color:var(--text2);">${f.exp != null ? f.exp.toFixed(2)+'%' : '—'}</td>
            <td>
              ${f.nav != null ? `<span style="font-weight:600;">₹${f.nav.toFixed(2)}</span>` : '—'}
              ${f.navDate ? `<br><span style="font-size:10px;color:var(--text3);">${f.navDate}</span>` : ''}
            </td>
            <td style="color:var(--text2);">${f.aum != null ? '₹'+f.aum.toLocaleString('en-IN',{maximumFractionDigits:0}) : '—'}</td>
            <td><button class="btn" style="padding:4px 9px;" onclick="quickAdd('${f.schemeCode}')"><i class="ti ti-plus" aria-hidden="true"></i></button></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="pagination">
        <span>Showing ${(start+1).toLocaleString('en-IN')}–${Math.min(start+TABLE_PAGE_SIZE, filteredCache.length).toLocaleString('en-IN')} of ${filteredCache.length.toLocaleString('en-IN')} funds</span>
        <div class="page-btns">
          <button class="page-btn" onclick="goPage(${tablePage-1})" ${tablePage===1?'disabled':''}>‹</button>
          ${pageButtons}
          <button class="page-btn" onclick="goPage(${tablePage+1})" ${tablePage===totalPages?'disabled':''}>›</button>
        </div>
      </div>
    </div>`;
}

function goPage(p) {
  const total = Math.ceil(filteredCache.length / TABLE_PAGE_SIZE);
  if (p < 1 || p > total) return;
  tablePage = p;
  renderTable();
  document.getElementById('panel-explore').scrollIntoView({ behavior:'smooth', block:'start' });
}

/* ── Fund select (portfolio) ── */
function populateFundSelect() {
  const sel = document.getElementById('pf-fund');
  // group by fund house for easier navigation
  const byHouse = {};
  allFunds.forEach(f => {
    const h = f.fundHouse || 'Other';
    if (!byHouse[h]) byHouse[h] = [];
    byHouse[h].push(f);
  });
  let html = '<option value="">Select a fund…</option>';
  Object.keys(byHouse).sort().forEach(h => {
    html += `<optgroup label="${h}">`;
    byHouse[h].forEach(f => {
      html += `<option value="${f.schemeCode}">${f.name}</option>`;
    });
    html += '</optgroup>';
  });
  sel.innerHTML = html;
}

/* ── Quick-add from table ── */
function quickAdd(schemeCode) {
  const f = allFunds.find(x => x.schemeCode == schemeCode);
  if (!f) return;
  document.getElementById('pf-fund').value = schemeCode;
  if (f.nav) document.getElementById('pf-nav').value = f.nav.toFixed(2);
  switchTab('portfolio');
  document.getElementById('pf-amount').focus();
}

/* ── Tab switching ── */
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['explore','portfolio'][i]===tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if (tab === 'portfolio') refreshPortfolioNavs();
}

/* ── Portfolio persistence ── */
function savePortfolio() { localStorage.setItem('mf_portfolio_v2', JSON.stringify(portfolio)); }
function loadPortfolio() {
  try { portfolio = JSON.parse(localStorage.getItem('mf_portfolio_v2') || '[]'); } catch(e) { portfolio = []; }
  updatePortfolioBadge();
}
function updatePortfolioBadge() {
  const b = document.getElementById('pf-count');
  b.textContent = portfolio.length;
  b.style.display = portfolio.length ? 'inline' : 'none';
}

/* ── Refresh live NAVs for holdings ── */
async function refreshPortfolioNavs() {
  if (!portfolio.length) { renderPortfolio(); return; }
  await Promise.all(portfolio.map(async h => {
    try {
      const r = await fetch(`${API}/scheme-code/${h.schemeCode}`);
      if (!r.ok) return;
      const j = await r.json();
      const d = j?.data;
      if (d?.latestNav) {
        h.liveNav  = parseFloat(d.latestNav);
        h.navDate  = d.latestNavDate || null;
        h.prevNav  = d.previousNav   ? parseFloat(d.previousNav) : h.prevNav;
        h.high52   = d['52WeekHighNav'] ? parseFloat(d['52WeekHighNav']) : h.high52;
        h.low52    = d['52WeekLowNav']  ? parseFloat(d['52WeekLowNav'])  : h.low52;
      }
    } catch(e) {}
  }));
  renderPortfolio();
}

/* ── Add holding ── */
function addToPortfolio() {
  const code = document.getElementById('pf-fund').value;
  const amt  = parseFloat(document.getElementById('pf-amount').value);
  const nav  = parseFloat(document.getElementById('pf-nav').value);
  if (!code || !amt || !nav) { alert('Please fill all fields.'); return; }
  const f = allFunds.find(x => x.schemeCode == code);
  if (!f) return;
  portfolio.push({
    id: Date.now(), schemeCode: f.schemeCode,
    name: f.name, cat: f.cat, risk: f.risk, plan: f.plan, fundHouse: f.fundHouse,
    buyNav: nav, invested: amt, units: amt / nav,
    liveNav: f.nav, navDate: f.navDate, ret1: f.ret1,
    prevNav: f.prevNav, high52: f.high52, low52: f.low52,
  });
  savePortfolio(); updatePortfolioBadge();
  document.getElementById('pf-amount').value = '';
  document.getElementById('pf-nav').value = '';
  document.getElementById('pf-fund').value = '';
  renderPortfolio();
}

function removeHolding(id) {
  portfolio = portfolio.filter(h => h.id !== id);
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
  savePortfolio(); updatePortfolioBadge();
  renderPortfolio();
}

/* ── Trend data ── */
function makeTrendData(h) {
  const nav    = h.liveNav || h.buyNav;
  const cagr1y = h.ret1 || 10;
  const low52  = h.low52  || nav * 0.88;
  const high52 = h.high52 || nav * 1.15;
  const prev   = h.prevNav || nav * 0.999;
  const start  = nav / (1 + cagr1y / 100);
  const range  = high52 - low52;
  const pts = Array.from({ length:18 }, (_,i) => {
    const t = i / 17;
    const trend = start + (nav - start) * t;
    const wave  = Math.sin(i*1.8)*range*0.06 + Math.cos(i*3.1)*range*0.03;
    return parseFloat(Math.max(low52*0.97, trend+wave).toFixed(2));
  });
  pts[16] = parseFloat(prev.toFixed(2));
  pts[17] = parseFloat(nav.toFixed(2));
  const now = new Date();
  const labels = Array.from({length:18}, (_,i) => {
    const d = new Date(now.getFullYear(), now.getMonth()-17+i, 1);
    return d.toLocaleString('en-IN', { month:'short', year:'2-digit' });
  });
  return { labels, data: pts };
}

/* ── Render portfolio ── */
function renderPortfolio() {
  const empty    = document.getElementById('pf-empty');
  const holdings = document.getElementById('pf-holdings');
  const pfM      = document.getElementById('pf-metrics');
  if (!portfolio.length) { empty.style.display='block'; holdings.innerHTML=''; pfM.style.display='none'; return; }
  empty.style.display = 'none';
  pfM.style.display   = 'grid';

  const totInv  = portfolio.reduce((s,h) => s+h.invested, 0);
  const totCur  = portfolio.reduce((s,h) => s+h.units*(h.liveNav||h.buyNav), 0);
  const totGain = totCur - totInv;
  const gainPct = totGain / totInv * 100;
  const navDate = portfolio.map(h=>h.navDate).filter(Boolean).sort().pop() || '—';

  pfM.innerHTML = `
    <div class="metric"><div class="metric-label">Total invested</div><div class="metric-value">₹${Math.round(totInv).toLocaleString('en-IN')}</div></div>
    <div class="metric"><div class="metric-label">Current value</div><div class="metric-value">₹${Math.round(totCur).toLocaleString('en-IN')}</div></div>
    <div class="metric"><div class="metric-label">Gain / loss</div><div class="metric-value ${totGain>=0?'green':'red'}">${totGain>=0?'+':''}₹${Math.round(totGain).toLocaleString('en-IN')}</div></div>
    <div class="metric"><div class="metric-label">Returns</div><div class="metric-value ${gainPct>=0?'green':'red'}">${gainPct>=0?'+':''}${gainPct.toFixed(1)}%</div></div>
    <div class="metric"><div class="metric-label">NAV as of</div><div class="metric-value" style="font-size:14px;">${navDate}</div></div>`;

  holdings.innerHTML = portfolio.map(h => {
    const live  = h.liveNav || h.buyNav;
    const curV  = h.units * live;
    const gain  = curV - h.invested;
    const gainP = gain / h.invested * 100;
    const dayC  = h.prevNav ? ((live-h.prevNav)/h.prevNav*100) : null;
    return `
      <div class="trend-card" id="card-${h.id}">
        <div class="trend-header">
          <div>
            <div class="trend-name">${h.name}</div>
            <div class="trend-meta">${h.cat} · ${h.plan} · ${h.risk} risk · ${h.units.toFixed(3)} units · bought @ ₹${h.buyNav.toFixed(2)}${h.navDate?' · '+h.navDate:''}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
            <span class="return-pill ${gainP>=0?'return-pos':'return-neg'}">${gainP>=0?'+':''}${gainP.toFixed(1)}%</span>
            <button class="btn btn-danger" onclick="removeHolding(${h.id})"><i class="ti ti-trash" aria-hidden="true"></i></button>
          </div>
        </div>
        <div class="holding-stats">
          <div><div class="h-stat-label">Invested</div><div class="h-stat-val">₹${Math.round(h.invested).toLocaleString('en-IN')}</div></div>
          <div><div class="h-stat-label">Current value</div><div class="h-stat-val">₹${Math.round(curV).toLocaleString('en-IN')}</div></div>
          <div><div class="h-stat-label">Gain / loss</div><div class="h-stat-val" style="color:${gain>=0?'#8bc34a':'#ef5350'};">${gain>=0?'+':''}₹${Math.round(gain).toLocaleString('en-IN')}</div></div>
          <div>
            <div class="h-stat-label">Live NAV ${dayC!=null?`<span style="color:${dayC>=0?'#8bc34a':'#ef5350'};font-size:10px;">(${dayC>=0?'+':''}${dayC.toFixed(2)}% today)</span>`:''}</div>
            <div class="h-stat-val">₹${live.toFixed(2)}</div>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="chart-${h.id}" role="img" aria-label="18-month NAV trend for ${h.name}">NAV trend.</canvas>
        </div>
      </div>`;
  }).join('');

  portfolio.forEach(h => {
    if (chartInstances[h.id]) { chartInstances[h.id].destroy(); }
    const td  = makeTrendData(h);
    const col = (h.units*(h.liveNav||h.buyNav) - h.invested) >= 0 ? '#639922' : '#E24B4A';
    chartInstances[h.id] = new Chart(document.getElementById('chart-'+h.id), {
      type:'line',
      data:{ labels:td.labels, datasets:[{
        label:'NAV (₹)', data:td.data, borderColor:col, borderWidth:2,
        pointRadius: ctx => ctx.dataIndex===td.data.length-1?5:2,
        pointBackgroundColor:col, fill:true, backgroundColor:col+'22', tension:0.35
      }]},
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx=>'₹'+ctx.parsed.y.toFixed(2) } } },
        scales:{
          x:{ ticks:{ font:{size:10}, color:'#636878', autoSkip:true, maxTicksLimit:9 }, grid:{display:false} },
          y:{ ticks:{ font:{size:10}, color:'#636878', callback:v=>'₹'+v.toFixed(0) }, grid:{ color:'rgba(255,255,255,.05)' } }
        }
      }
    });
  });
}

/* ── Boot ── */
loadPortfolio();
loadAllFunds();
</script>
