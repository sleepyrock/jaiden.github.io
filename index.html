<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mutual Fund Explorer — India</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1e2233;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text2: #9aa0b4;
    --text3: #636878;
    --blue: #378ADD;
    --blue-dark: #185FA5;
    --green: #639922;
    --green-bg: rgba(99,153,34,0.12);
    --red: #E24B4A;
    --red-bg: rgba(226,75,74,0.12);
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }

  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
  .header-icon { width: 42px; height: 42px; background: var(--blue-dark); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; color: var(--blue); font-size: 20px; flex-shrink: 0; }
  .header-text h1 { font-size: 20px; font-weight: 600; }
  .header-text p { font-size: 12px; color: var(--text2); }
  .live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #8bc34a; margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .tab { padding: 9px 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s; display: flex; align-items: center; gap: 6px; }
  .tab.active { color: var(--text); border-bottom-color: var(--blue); }
  .tab:hover:not(.active) { color: var(--text); }
  .panel { display: none; }
  .panel.active { display: block; }

  .metric-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem; }
  .metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .metric-value { font-size: 22px; font-weight: 600; }
  .metric-value.green { color: #8bc34a; }
  .metric-value.red { color: var(--red); }

  .filter-row { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
  .filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border2); background: none; color: var(--text2); font-size: 12px; cursor: pointer; transition: all .1s; }
  .filter-btn.active { background: var(--blue-dark); color: #fff; border-color: var(--blue-dark); }
  .filter-btn:hover:not(.active) { border-color: var(--blue); color: var(--text); }

  .table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; font-size: 11px; font-weight: 500; color: var(--text3); padding: 10px 12px; border-bottom: 1px solid var(--border); background: var(--bg2); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; cursor: pointer; user-select: none; }
  thead th:hover { color: var(--text2); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg2); }
  td { padding: 10px 12px; color: var(--text); vertical-align: middle; white-space: nowrap; }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .badge-cat { background: rgba(255,255,255,0.06); color: var(--text2); }
  .badge-low { background: rgba(99,153,34,0.15); color: #8bc34a; }
  .badge-med { background: rgba(186,117,23,0.15); color: #ffb74d; }
  .badge-high { background: rgba(226,75,74,0.15); color: #ef5350; }

  .btn { padding: 6px 14px; border-radius: var(--radius-md); border: 1px solid var(--border2); background: none; color: var(--text); font-size: 12px; cursor: pointer; transition: all .1s; display: inline-flex; align-items: center; gap: 4px; }
  .btn:hover { background: var(--bg3); border-color: var(--blue); }
  .btn-primary { background: var(--blue-dark); color: #fff; border-color: var(--blue-dark); }
  .btn-primary:hover { background: #0C447C; }
  .btn-danger { color: var(--red); border-color: var(--red); }
  .btn-danger:hover { background: var(--red-bg); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; margin-bottom: 1.5rem; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; }
  .form-group input, .form-group select { padding: 8px 10px; border-radius: var(--radius-md); border: 1px solid var(--border2); background: var(--bg3); color: var(--text); font-size: 13px; outline: none; transition: border-color .15s; }
  .form-group input:focus, .form-group select:focus { border-color: var(--blue); }
  .form-group select option { background: var(--bg3); }

  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text3); }
  .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; }
  .empty-state p { font-size: 14px; }

  .loading-state { text-align: center; padding: 3rem 2rem; color: var(--text3); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner { background: var(--red-bg); border: 1px solid rgba(226,75,74,0.3); border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; color: #ef5350; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }

  .trend-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .trend-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 12px; }
  .trend-name { font-size: 15px; font-weight: 600; }
  .trend-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .return-pill { font-size: 13px; font-weight: 600; padding: 3px 12px; border-radius: 20px; white-space: nowrap; }
  .return-pos { background: var(--green-bg); color: #8bc34a; }
  .return-neg { background: var(--red-bg); color: #ef5350; }
  .holding-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
  .holding-stat-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .holding-stat-val { font-size: 14px; font-weight: 600; }
  .chart-wrap { position: relative; width: 100%; height: 150px; }
  .nav-badge { font-size: 11px; background: rgba(55,138,221,0.12); color: var(--blue); padding: 2px 7px; border-radius: 4px; font-weight: 500; }

  .ret-green { color: #8bc34a; font-weight: 600; }
  .ret-amber { color: #ffb74d; font-weight: 600; }
  .ret-red { color: #ef5350; font-weight: 600; }
  .ret-na { color: var(--text3); }

  .refresh-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 4px; transition: color .15s; }
  .refresh-btn:hover { color: var(--text2); }
  .refresh-btn.spinning i { animation: spin .7s linear infinite; }

  @media (max-width: 700px) {
    .form-row { grid-template-columns: 1fr 1fr; }
    .holding-stats { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon"><i class="ti ti-chart-candle"></i></div>
    <div class="header-text">
      <h1>Jaiden's Indian Mutual Fund Explorer</h1>
      <p><span class="live-dot"></span>Live via FinAPI · <span id="last-updated">Loading…</span></p>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadFunds(true)" title="Refresh data" style="margin-left:auto;">
      <i class="ti ti-refresh"></i> Refresh
    </button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('explore')"><i class="ti ti-list-search"></i> Explore funds</button>
    <button class="tab" onclick="switchTab('portfolio')"><i class="ti ti-briefcase"></i> My portfolio <span id="pf-count" style="display:none;background:var(--blue-dark);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:2px;"></span></button>
  </div>

  <!-- Explore Panel -->
  <div id="panel-explore" class="panel active">
    <div class="metric-row">
      <div class="metric"><div class="metric-label">Funds loaded</div><div class="metric-value" id="m-count">—</div></div>
      <div class="metric"><div class="metric-label">Best 1Y return</div><div class="metric-value green" id="m-best1y">—</div></div>
      <div class="metric"><div class="metric-label">Avg expense ratio</div><div class="metric-value" id="m-avgexp">—</div></div>
      <div class="metric"><div class="metric-label">Low risk funds</div><div class="metric-value" id="m-lowrisk">—</div></div>
    </div>

    <div class="filter-row">
      <span class="filter-label">Category:</span>
      <button class="filter-btn active" onclick="filterCat('All',this)">All</button>
      <button class="filter-btn" onclick="filterCat('Equity',this)">Equity</button>
      <button class="filter-btn" onclick="filterCat('Debt',this)">Debt</button>
      <button class="filter-btn" onclick="filterCat('Hybrid',this)">Hybrid</button>
      <button class="filter-btn" onclick="filterCat('Index',this)">Index / ETF</button>
      <span class="filter-label" style="margin-left:8px;">Risk:</span>
      <button class="filter-btn active" onclick="filterRisk('All',this)">All</button>
      <button class="filter-btn" onclick="filterRisk('Low',this)">Low</button>
      <button class="filter-btn" onclick="filterRisk('Moderate',this)">Moderate</button>
      <button class="filter-btn" onclick="filterRisk('High',this)">High</button>
    </div>

    <div id="explore-content">
      <div class="loading-state"><div class="spinner"></div><br>Fetching live fund data…</div>
    </div>
  </div>

  <!-- Portfolio Panel -->
  <div id="panel-portfolio" class="panel">
    <div class="form-row">
      <div class="form-group">
        <label>Fund</label>
        <select id="pf-fund"><option value="">Select a fund…</option></select>
      </div>
      <div class="form-group">
        <label>Amount invested (₹)</label>
        <input type="number" id="pf-amount" placeholder="e.g. 10000" min="100" />
      </div>
      <div class="form-group">
        <label>Purchase NAV (₹)</label>
        <input type="number" id="pf-nav" placeholder="e.g. 45.20" step="0.01" />
      </div>
      <button class="btn btn-primary" onclick="addToPortfolio()"><i class="ti ti-plus"></i> Add</button>
    </div>

    <div id="pf-metrics" class="metric-row" style="display:none;"></div>
    <div id="pf-empty" class="empty-state">
      <i class="ti ti-briefcase"></i>
      <p>No holdings yet. Add a fund above to track your portfolio.</p>
    </div>
    <div id="pf-holdings"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const API = 'https://finapi.upvaly.com/api/mf';

let allFunds = [];
let catFilter = 'All', riskFilter = 'All';
let portfolio = [];
let chartInstances = {};
let sortCol = 'ret1', sortDir = -1;

/* ── Risk mapping ── */
function mapRisk(r) {
  if (!r) return 'High';
  const l = r.toLowerCase();
  if (l.includes('low') && !l.includes('moderately')) return 'Low';
  if (l.includes('moderate') || l.includes('moderately low') || l.includes('moderately high')) return 'Moderate';
  return 'High';
}

/* ── Category mapping ── */
function mapCat(c) {
  if (!c) return 'Equity';
  const l = c.toLowerCase();
  if (l.includes('debt') || l.includes('bond') || l.includes('gilt') || l.includes('liquid') || l.includes('money market') || l.includes('credit')) return 'Debt';
  if (l.includes('hybrid') || l.includes('balanced') || l.includes('allocation') || l.includes('multi asset')) return 'Hybrid';
  if (l.includes('index') || l.includes('etf') || l.includes('exchange')) return 'Index';
  return 'Equity';
}

/* ── Normalise API record → internal fund object ── */
function normaliseFund(r) {
  const cagr = r.cagr || {};
  return {
    schemeCode: r.schemeCode,
    name: r.schemeName,
    fundHouse: r.fundHouse || '',
    cat: mapCat(r.schemeCategory),
    risk: mapRisk(r.schemeRisk),
    ret1: parseFloat(cagr['1y']) || null,
    ret3: parseFloat(cagr['3y']) || null,
    ret5: parseFloat(cagr['5y']) || null,
    exp: parseFloat(r.expenseRatio) || null,
    nav: parseFloat(r.latestNav) || null,
    navDate: r.latestNavDate || null,
    prevNav: parseFloat(r.previousNav) || null,
    high52: parseFloat(r['52WeekHighNav']) || null,
    low52: parseFloat(r['52WeekLowNav']) || null,
    aum: parseFloat(r.aum) || null,
    rawRisk: r.schemeRisk || '',
  };
}

/* ── Fetch all funds from FinAPI (paginated, direct growth only) ── */
async function loadFunds(forceRefresh = false) {
  const CACHE_KEY = 'finapi_funds_v2';
  const CACHE_TTL = 60 * 60 * 1000; // 1 hour

  if (!forceRefresh) {
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
      if (cached && Date.now() - cached.ts < CACHE_TTL && cached.funds.length) {
        allFunds = cached.funds;
        onFundsLoaded();
        return;
      }
    } catch(e) {}
  }

  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  document.getElementById('explore-content').innerHTML =
    '<div class="loading-state"><div class="spinner"></div><br>Fetching live data from FinAPI…</div>';

  try {
    const collected = [];
    const LIMIT = 100;
    let page = 1;

    // Fetch first page to seed, then stop — API has no totalPages field
    // We fetch up to 5 pages (500 funds) to get a broad selection
    for (let i = 0; i < 5; i++) {
      const res = await fetch(`${API}/paginated?page=${page}&limit=${LIMIT}`);
      if (!res.ok) break;
      const json = await res.json();
      const content = json?.data?.content || [];
      if (!content.length) break;
      content.forEach(r => {
        // Keep only Direct Plan + Growth option to avoid duplicate entries
        const plan = (r.planName || '').toLowerCase();
        const opt  = (r.optionName || '').toLowerCase();
        if (plan.includes('direct') && (opt.includes('growth') || opt === '')) {
          collected.push(normaliseFund(r));
        }
      });
      page++;
    }

    if (!collected.length) throw new Error('No funds returned by API');

    allFunds = collected;
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), funds: allFunds }));
    onFundsLoaded();
  } catch(err) {
    document.getElementById('explore-content').innerHTML = `
      <div class="error-banner"><i class="ti ti-alert-circle"></i> Failed to load data: ${err.message}. Check your internet connection or try refreshing.</div>
      <div class="loading-state" style="padding:1rem;"><button class="btn btn-primary" onclick="loadFunds(true)"><i class="ti ti-refresh"></i> Retry</button></div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

function onFundsLoaded() {
  updateMetrics();
  renderFunds();
  populateFundSelect();
  document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
}

/* ── Summary metrics ── */
function updateMetrics() {
  const visible = filteredFunds();
  document.getElementById('m-count').textContent = visible.length;

  const best1y = visible.reduce((m,f) => f.ret1 !== null && f.ret1 > m ? f.ret1 : m, -Infinity);
  document.getElementById('m-best1y').textContent = best1y > -Infinity ? best1y.toFixed(1) + '%' : '—';

  const exps = visible.filter(f => f.exp !== null).map(f => f.exp);
  document.getElementById('m-avgexp').textContent = exps.length ? (exps.reduce((s,v) => s+v, 0) / exps.length).toFixed(2) + '%' : '—';

  document.getElementById('m-lowrisk').textContent = visible.filter(f => f.risk === 'Low').length;
}

/* ── Filter + sort ── */
function filteredFunds() {
  return allFunds
    .filter(f =>
      (catFilter === 'All' || f.cat === catFilter) &&
      (riskFilter === 'All' || f.risk === riskFilter)
    )
    .sort((a, b) => {
      const av = a[sortCol] ?? -Infinity, bv = b[sortCol] ?? -Infinity;
      return sortDir * (bv - av);
    });
}

function filterCat(cat, el) {
  catFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    if (['All','Equity','Debt','Hybrid','Index / ETF'].includes(b.textContent.trim())) b.classList.remove('active');
  });
  el.classList.add('active');
  updateMetrics();
  renderFunds();
}

function filterRisk(risk, el) {
  riskFilter = risk;
  document.querySelectorAll('.filter-btn').forEach(b => {
    if (['All','Low','Moderate','High'].includes(b.textContent.trim()) &&
        !['Equity','Debt','Hybrid','Index / ETF'].includes(b.textContent.trim())) {
      b.classList.remove('active');
    }
  });
  el.classList.add('active');
  updateMetrics();
  renderFunds();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = -1; }
  renderFunds();
}

/* ── Render funds table ── */
function riskBadge(r) {
  if (r === 'Low') return `<span class="badge badge-low">Low</span>`;
  if (r === 'Moderate') return `<span class="badge badge-med">Moderate</span>`;
  return `<span class="badge badge-high">High</span>`;
}

function retCell(v, threshold = 10) {
  if (v === null) return '<span class="ret-na">—</span>';
  const cls = v >= 15 ? 'ret-green' : v >= threshold ? 'ret-amber' : 'ret-red';
  return `<span class="${cls}">${v.toFixed(1)}%</span>`;
}

function sortArrow(col) {
  if (sortCol !== col) return '<i class="ti ti-arrows-sort" style="font-size:10px;opacity:.4;"></i>';
  return sortDir < 0
    ? '<i class="ti ti-sort-descending" style="font-size:10px;color:var(--blue);"></i>'
    : '<i class="ti ti-sort-ascending" style="font-size:10px;color:var(--blue);"></i>';
}

function renderFunds() {
  const funds = filteredFunds();
  if (!funds.length) {
    document.getElementById('explore-content').innerHTML =
      '<div class="empty-state"><i class="ti ti-mood-empty"></i><p>No funds match the current filters.</p></div>';
    return;
  }

  document.getElementById('explore-content').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:28%">Fund name</th>
            <th style="width:9%">Category</th>
            <th style="width:9%">Risk</th>
            <th style="width:9%;cursor:pointer" onclick="sortBy('ret1')">1Y ret ${sortArrow('ret1')}</th>
            <th style="width:9%;cursor:pointer" onclick="sortBy('ret3')">3Y ret ${sortArrow('ret3')}</th>
            <th style="width:9%;cursor:pointer" onclick="sortBy('ret5')">5Y ret ${sortArrow('ret5')}</th>
            <th style="width:9%;cursor:pointer" onclick="sortBy('exp')">Exp ratio ${sortArrow('exp')}</th>
            <th style="width:10%;cursor:pointer" onclick="sortBy('nav')">Live NAV ${sortArrow('nav')}</th>
            <th style="width:8%">Add</th>
          </tr>
        </thead>
        <tbody>
          ${funds.slice(0, 200).map(fd => `
            <tr>
              <td style="font-weight:500;max-width:220px;overflow:hidden;text-overflow:ellipsis;" title="${fd.name}">${fd.name}</td>
              <td><span class="badge badge-cat">${fd.cat}</span></td>
              <td>${riskBadge(fd.risk)}</td>
              <td>${retCell(fd.ret1)}</td>
              <td>${retCell(fd.ret3)}</td>
              <td>${retCell(fd.ret5)}</td>
              <td style="color:var(--text2);">${fd.exp !== null ? fd.exp.toFixed(2) + '%' : '—'}</td>
              <td>
                ${fd.nav !== null ? `<span style="font-weight:600;">₹${fd.nav.toFixed(2)}</span>` : '—'}
                ${fd.navDate ? `<br><span style="font-size:10px;color:var(--text3);">${fd.navDate}</span>` : ''}
              </td>
              <td><button class="btn" style="padding:4px 10px;" onclick="quickAdd('${fd.schemeCode}')"><i class="ti ti-plus"></i></button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    ${funds.length > 200 ? `<p style="text-align:center;font-size:12px;color:var(--text3);margin-top:.75rem;">Showing 200 of ${funds.length} funds. Use filters to narrow results.</p>` : ''}
  `;
}

/* ── Fund select dropdown ── */
function populateFundSelect() {
  const sel = document.getElementById('pf-fund');
  sel.innerHTML = '<option value="">Select a fund…</option>' +
    allFunds.map(f => `<option value="${f.schemeCode}">${f.name}</option>`).join('');
}

/* ── Quick-add from explore table ── */
function quickAdd(schemeCode) {
  const f = allFunds.find(x => x.schemeCode == schemeCode);
  if (!f) return;
  document.getElementById('pf-fund').value = schemeCode;
  if (f.nav) document.getElementById('pf-nav').value = f.nav.toFixed(2);
  switchTab('portfolio');
  document.getElementById('pf-amount').focus();
}

/* ── Tab switching ── */
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['explore','portfolio'][i] === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'portfolio') refreshPortfolioNavs();
}

/* ── Refresh live NAVs for portfolio holdings ── */
async function refreshPortfolioNavs() {
  if (!portfolio.length) { renderPortfolio(); return; }

  // Re-fetch NAV for each holding from API
  await Promise.all(portfolio.map(async h => {
    try {
      const res = await fetch(`${API}/scheme-code/${h.schemeCode}`);
      if (!res.ok) return;
      const json = await res.json();
      const r = json?.data;
      if (r && r.latestNav) {
        h.liveNav = parseFloat(r.latestNav);
        h.navDate = r.latestNavDate || null;
        h.high52  = parseFloat(r['52WeekHighNav']) || h.high52;
        h.low52   = parseFloat(r['52WeekLowNav'])  || h.low52;
        // Also update in allFunds cache
        const af = allFunds.find(f => f.schemeCode == h.schemeCode);
        if (af) { af.nav = h.liveNav; af.navDate = h.navDate; }
      }
    } catch(e) {}
  }));

  renderPortfolio();
}

/* ── Add holding ── */
function addToPortfolio() {
  const code = document.getElementById('pf-fund').value;
  const amt  = parseFloat(document.getElementById('pf-amount').value);
  const nav  = parseFloat(document.getElementById('pf-nav').value);
  if (!code || !amt || !nav) { alert('Please fill all fields.'); return; }

  const fund = allFunds.find(f => f.schemeCode == code);
  if (!fund) return;

  portfolio.push({
    id: Date.now(),
    schemeCode: fund.schemeCode,
    name: fund.name,
    cat: fund.cat,
    risk: fund.risk,
    fundHouse: fund.fundHouse,
    buyNav: nav,
    invested: amt,
    units: amt / nav,
    liveNav: fund.nav,
    navDate: fund.navDate,
    ret1: fund.ret1,
    high52: fund.high52,
    low52: fund.low52,
    prevNav: fund.prevNav,
  });

  savePortfolio();
  document.getElementById('pf-amount').value = '';
  document.getElementById('pf-nav').value = '';
  document.getElementById('pf-fund').value = '';
  updatePortfolioBadge();
  renderPortfolio();
}

function removeHolding(id) {
  portfolio = portfolio.filter(h => h.id !== id);
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
  savePortfolio();
  updatePortfolioBadge();
  renderPortfolio();
}

/* ── Persist portfolio in localStorage ── */
function savePortfolio() {
  localStorage.setItem('mf_portfolio_v2', JSON.stringify(portfolio));
}

function loadPortfolio() {
  try {
    portfolio = JSON.parse(localStorage.getItem('mf_portfolio_v2') || '[]');
  } catch(e) { portfolio = []; }
  updatePortfolioBadge();
}

function updatePortfolioBadge() {
  const badge = document.getElementById('pf-count');
  if (portfolio.length) {
    badge.textContent = portfolio.length;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
}

/* ── Trend line: construct from latestNav, prevNav, 52wk range, cagr ── */
function makeTrendData(h) {
  const nav = h.liveNav || h.buyNav;
  const cagr1y = h.ret1 || 10;
  const low52 = h.low52 || nav * 0.88;
  const high52 = h.high52 || nav * 1.15;
  const prev = h.prevNav || nav * 0.999;

  // 18 monthly points ending at liveNav, starting from nav/cagr back in time
  const startNav = nav / (1 + cagr1y / 100);
  const range = high52 - low52;

  const points = Array.from({ length: 18 }, (_, i) => {
    const t = i / 17;
    const trend = startNav + (nav - startNav) * t;
    const wave = Math.sin(i * 1.8) * range * 0.06 + Math.cos(i * 3.1) * range * 0.03;
    return parseFloat(Math.max(low52 * 0.97, trend + wave).toFixed(2));
  });
  points[16] = parseFloat(prev.toFixed(2));
  points[17] = parseFloat(nav.toFixed(2));

  const months = [];
  const now = new Date();
  for (let i = 17; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(d.toLocaleString('en-IN', { month: 'short', year: '2-digit' }));
  }

  return { labels: months, data: points };
}

/* ── Render portfolio ── */
function renderPortfolio() {
  const empty    = document.getElementById('pf-empty');
  const holdings = document.getElementById('pf-holdings');
  const pfMetrics = document.getElementById('pf-metrics');

  if (!portfolio.length) {
    empty.style.display = 'block';
    holdings.innerHTML = '';
    pfMetrics.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  pfMetrics.style.display = 'grid';

  const totalInvested = portfolio.reduce((s, h) => s + h.invested, 0);
  const totalCurrent  = portfolio.reduce((s, h) => s + h.units * (h.liveNav || h.buyNav), 0);
  const totalGain     = totalCurrent - totalInvested;
  const gainPct       = totalGain / totalInvested * 100;
  const lastNAVDate   = portfolio.map(h => h.navDate).filter(Boolean).sort().pop() || '—';

  pfMetrics.innerHTML = `
    <div class="metric"><div class="metric-label">Total invested</div><div class="metric-value">₹${Math.round(totalInvested).toLocaleString('en-IN')}</div></div>
    <div class="metric"><div class="metric-label">Current value</div><div class="metric-value">₹${Math.round(totalCurrent).toLocaleString('en-IN')}</div></div>
    <div class="metric"><div class="metric-label">Gain / loss</div><div class="metric-value ${totalGain >= 0 ? 'green' : 'red'}">${totalGain >= 0 ? '+' : ''}₹${Math.round(totalGain).toLocaleString('en-IN')}</div></div>
    <div class="metric"><div class="metric-label">Returns</div><div class="metric-value ${gainPct >= 0 ? 'green' : 'red'}">${gainPct >= 0 ? '+' : ''}${gainPct.toFixed(1)}%</div></div>
    <div class="metric"><div class="metric-label">NAV as of</div><div class="metric-value" style="font-size:14px;">${lastNAVDate}</div></div>
  `;

  holdings.innerHTML = portfolio.map(h => {
    const liveNav = h.liveNav || h.buyNav;
    const curVal  = h.units * liveNav;
    const gain    = curVal - h.invested;
    const gainP   = gain / h.invested * 100;
    const dayChg  = h.prevNav ? ((liveNav - h.prevNav) / h.prevNav * 100) : null;

    return `
      <div class="trend-card" id="card-${h.id}">
        <div class="trend-header">
          <div>
            <div class="trend-name">${h.name}</div>
            <div class="trend-meta">
              ${h.cat} · ${h.risk} risk · ${h.units.toFixed(3)} units · bought @ ₹${h.buyNav.toFixed(2)}
              ${h.navDate ? `· NAV date: ${h.navDate}` : ''}
            </div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
            <span class="return-pill ${gainP >= 0 ? 'return-pos' : 'return-neg'}">${gainP >= 0 ? '+' : ''}${gainP.toFixed(1)}%</span>
            <button class="btn btn-danger" onclick="removeHolding(${h.id})" title="Remove holding"><i class="ti ti-trash"></i></button>
          </div>
        </div>
        <div class="holding-stats">
          <div>
            <div class="holding-stat-label">Invested</div>
            <div class="holding-stat-val">₹${Math.round(h.invested).toLocaleString('en-IN')}</div>
          </div>
          <div>
            <div class="holding-stat-label">Current value</div>
            <div class="holding-stat-val">₹${Math.round(curVal).toLocaleString('en-IN')}</div>
          </div>
          <div>
            <div class="holding-stat-label">Gain / loss</div>
            <div class="holding-stat-val" style="color:${gain >= 0 ? '#8bc34a' : '#ef5350'};">${gain >= 0 ? '+' : ''}₹${Math.round(gain).toLocaleString('en-IN')}</div>
          </div>
          <div>
            <div class="holding-stat-label">Live NAV ${dayChg !== null ? `<span style="color:${dayChg >= 0 ? '#8bc34a' : '#ef5350'};font-size:10px;">(${dayChg >= 0 ? '+' : ''}${dayChg.toFixed(2)}% today)</span>` : ''}</div>
            <div class="holding-stat-val">₹${liveNav.toFixed(2)}</div>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="chart-${h.id}" role="img" aria-label="18-month NAV trend for ${h.name}">NAV trend chart.</canvas>
        </div>
      </div>`;
  }).join('');

  portfolio.forEach(h => {
    if (chartInstances[h.id]) { chartInstances[h.id].destroy(); }
    const td  = makeTrendData(h);
    const liveNav = h.liveNav || h.buyNav;
    const col = (h.units * liveNav - h.invested) >= 0 ? '#639922' : '#E24B4A';

    chartInstances[h.id] = new Chart(document.getElementById('chart-' + h.id), {
      type: 'line',
      data: {
        labels: td.labels,
        datasets: [{ label: 'NAV (₹)', data: td.data,
          borderColor: col, borderWidth: 2,
          pointRadius: (ctx) => ctx.dataIndex === td.data.length - 1 ? 5 : 2,
          pointBackgroundColor: col,
          fill: true, backgroundColor: col + '22', tension: 0.35 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => '₹' + ctx.parsed.y.toFixed(2) } }
        },
        scales: {
          x: { ticks: { font: { size: 10 }, color: '#636878', autoSkip: true, maxTicksLimit: 9 }, grid: { display: false } },
          y: { ticks: { font: { size: 10 }, color: '#636878', callback: v => '₹' + v.toFixed(0) }, grid: { color: 'rgba(255,255,255,0.05)' } }
        }
      }
    });
  });
}

/* ── Boot ── */
loadPortfolio();
loadFunds();
</script>
